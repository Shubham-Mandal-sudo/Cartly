{% if messages %}
    <div id="toast-container" class="fixed top-20 right-4 sm:right-8 z-[100] flex flex-col gap-3 max-w-sm w-full pointer-events-none">
        {% for message in messages %}
            <div class="toast-message pointer-events-auto flex items-start justify-between p-4 rounded-2xl shadow-xl border border-gray-100 bg-white transform transition-all duration-500 translate-x-full opacity-0">
                
                <div class="flex items-start gap-3">
                    {% if message.tags == 'success' %}
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center">
                            <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    {% elif message.tags == 'error' %}
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-red-50 flex items-center justify-center">
                            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                    {% elif message.tags == 'warning' %}
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center">
                            <svg class="w-6 h-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                    {% else %}
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center">
                            <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                    {% endif %}
                    
                    <p class="text-sm font-medium text-gray-800 mt-1 leading-snug">{{ message }}</p>
                </div>

                <button onclick="this.closest('.toast-message').remove()" class="ml-4 text-gray-400 hover:text-gray-600 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        {% endfor %}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toasts = document.querySelectorAll('.toast-message');
            
            toasts.forEach((toast, index) => {
                // 1. Slide In (Staggered if there are multiple messages)
                setTimeout(() => {
                    toast.classList.remove('translate-x-full', 'opacity-0');
                    toast.classList.add('translate-x-0', 'opacity-100');
                }, index * 150 + 100); 

                // 2. Auto Dismiss after 4.5 seconds
                setTimeout(() => {
                    toast.classList.remove('translate-x-0', 'opacity-100');
                    toast.classList.add('translate-x-full', 'opacity-0');
                    
                    // Remove from DOM entirely after the exit animation finishes
                    setTimeout(() => toast.remove(), 500); 
                }, 4500 + (index * 150));
            });
        });
    </script>
{% endif %}
