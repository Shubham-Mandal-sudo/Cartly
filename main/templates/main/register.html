<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account | Cartly</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col justify-center relative py-12 sm:px-6 lg:px-8">

    {% include 'main/messages.html' %}

    <div class="absolute top-6 left-6 sm:top-8 sm:left-8">
        <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 hover:text-indigo-600 transition-colors active:scale-95 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Store
        </a>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md z-10">
        <h1 class="text-center text-4xl font-extrabold text-indigo-600 tracking-tight mb-2">Cartly.</h1>
        <h2 class="text-center text-2xl font-bold text-gray-900">Create an account</h2>
        <p class="mt-2 text-center text-sm text-gray-500">
            Join us today as a shopper or a seller.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xl z-10">
        <div class="bg-white py-8 px-4 shadow-xl border border-gray-100 sm:rounded-3xl sm:px-10">
            

            <form method="POST" action="{% url 'register' %}" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                        <div class="mt-2">
                            <input id="username" name="username" type="text" required class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                        <div class="mt-2">
                            <input id="email" name="email" type="email" required class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-2">
                            <input id="password" name="password" type="password" required class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                        </div>
                    </div>

                    <div>
                        <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                        <div class="mt-2">
                            <input id="confirm_password" name="confirm_password" type="password" required class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                        </div>
                    </div>
                </div>

                <hr class="border-gray-100">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">I want to register as a:</label>
                    <div class="flex items-center gap-6 p-4 border border-gray-200 rounded-xl bg-gray-50/50">
                        <div class="flex items-center">
                            <input id="role_customer" name="role" type="radio" value="customer" checked onchange="toggleCompanyField()" class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-600 cursor-pointer">
                            <label for="role_customer" class="ml-2 block text-sm font-medium text-gray-900 cursor-pointer">
                                Customer <span class="text-gray-500 font-normal">(Buy items)</span>
                            </label>
                        </div>
                        <div class="flex items-center">
                            <input id="role_seller" name="role" type="radio" value="seller" onchange="toggleCompanyField()" class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-600 cursor-pointer">
                            <label for="role_seller" class="ml-2 block text-sm font-medium text-gray-900 cursor-pointer">
                                Seller <span class="text-gray-500 font-normal">(List items)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="company_name_div" class="hidden transition-all duration-300">
                    <label for="company_name" class="block text-sm font-medium text-gray-700">Company / Store Name</label>
                    <div class="mt-2">
                        <input id="company_name" name="company_name" type="text" placeholder="Enter your business name" class="appearance-none block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg transition-all active:scale-95">
                        Create Account
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-gray-100">
                <p class="text-sm text-gray-600">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="font-bold text-indigo-600 hover:text-indigo-700 transition-colors">Sign in here</a>
                </p>
            </div>
            
        </div>
    </div>

    <script>
        function toggleCompanyField() {
            const isSeller = document.getElementById('role_seller').checked;
            const companyDiv = document.getElementById('company_name_div');
            const companyInput = document.getElementById('company_name');
            
            if (isSeller) {
                // Show the field using Tailwind classes
                companyDiv.classList.remove('hidden');
                companyDiv.classList.add('block');
                companyInput.required = true;
            } else {
                // Hide the field
                companyDiv.classList.remove('block');
                companyDiv.classList.add('hidden');
                companyInput.required = false;
            }
        }
    </script>

</body>
</html>
