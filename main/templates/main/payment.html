<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment | Cartly</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Force the Razorpay generated button to match our Tailwind design system */
        .razorpay-payment-button {
            width: 100%;
            background-color: #4f46e5 !important; /* Tailwind indigo-600 */
            color: white !important;
            font-weight: 700 !important;
            padding: 1rem 2rem !important;
            border-radius: 0.75rem !important; /* rounded-xl */
            border: none !important;
            font-size: 1.125rem !important; /* text-lg */
            cursor: pointer !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
            transition: all 0.2s ease-in-out !important;
        }
        
        .razorpay-payment-button:hover {
            background-color: #4338ca !important; /* Tailwind indigo-700 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05) !important;
        }
        
        .razorpay-payment-button:active {
            transform: scale(0.95) !important; /* The click animation */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 relative">

    <!-- Global Toast Messages -->
    {% include 'main/messages.html' %}

    <div class="max-w-md w-full bg-white shadow-xl border border-gray-100 rounded-3xl p-8 relative overflow-hidden">
        
        <!-- Decorative Header Background -->
        <div class="absolute top-0 left-0 w-full h-2 bg-indigo-600"></div>

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight mb-2">Cartly.</h1>
            <div class="flex items-center justify-center gap-2 text-gray-900">
                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path></svg>
                <h2 class="text-xl font-bold">Secure Payment</h2>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100 text-center">
            <p class="text-sm text-gray-500 font-medium mb-1">Order #{{ order.id }}</p>
            <p class="text-gray-600 text-sm mb-4">Total amount to pay</p>
            <h1 class="text-5xl font-extrabold text-emerald-600 tracking-tight">₹{{ order.total_price }}</h1>
        </div>
        
        <!-- Razorpay Form -->
        <div class="w-full">
            <form action="{{ callback_url }}" method="POST">
                {% csrf_token %}
                
                <!-- Notice we changed data-name to Cartly and data-theme.color to our indigo-600 hex code -->
                <script src="https://checkout.razorpay.com/v1/checkout.js"
                        data-key="{{ razorpay_key }}"
                        data-amount="{{ amount_in_paise }}"
                        data-currency="INR"
                        data-order_id="{{ order.razorpay_order_id }}"
                        data-buttontext="Pay Securely Now"
                        data-name="Cartly"
                        data-description="Order #{{ order.id }}"
                        data-theme.color="#4f46e5">
                </script>
            </form>
        </div>

        <!-- Trust Badges & Cancel Link -->
        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <div class="flex justify-center items-center gap-6 text-xs text-gray-400 font-medium mb-6">
                <div class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    256-bit SSL
                </div>
                <div class="flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Razorpay Secure
                </div>
            </div>

            <!-- Allow them to cancel and return to cart if needed -->
            <a href="{% url 'cart' %}" class="text-sm font-medium text-gray-500 hover:text-red-600 transition-colors">
                Cancel payment & return to cart
            </a>
        </div>

    </div>

</body>
</html>
