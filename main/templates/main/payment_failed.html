<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Failed | Cartly</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 relative">

    <div class="absolute top-6 left-6 sm:top-8 sm:left-8">
        <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 hover:text-indigo-600 transition-colors active:scale-95 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Store
        </a>
    </div>

    {% include 'main/messages.html' %}

    <div class="max-w-md w-full bg-white shadow-xl border border-gray-100 rounded-3xl p-8 relative overflow-hidden text-center">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-red-500"></div>

        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-red-100">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </div>

        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Payment Failed</h1>
        <p class="text-gray-500 mb-6">We could not process the payment for <strong class="text-gray-800">Order #{{ order.id }}</strong>.</p>

        <div class="bg-orange-50 border border-orange-100 rounded-2xl p-4 mb-8 text-left flex items-start gap-3">
            <div class="flex-shrink-0 mt-0.5 text-orange-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <p class="text-sm font-medium text-orange-800 leading-snug">
                Don't worry, <span class="font-bold">no funds were deducted</span> from your account. Please check your payment details or try a different card.
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'cart' %}" class="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-95 text-base">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Return to Cart & Retry
            </a>
            
            <a href="{% url 'home' %}" class="w-full block py-3.5 px-4 text-sm font-bold text-gray-500 hover:text-gray-800 bg-gray-50 hover:bg-gray-100 rounded-xl transition-colors active:scale-95 border border-gray-100">
                Cancel Order
            </a>
        </div>

    </div>

</body>
</html>
